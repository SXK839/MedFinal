server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: auth
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: patient
          uri: http://localhost:8082
          predicates:
            - Path=/patients/** 

        - id: patient
          uri: http://localhost:8083
          predicates:
            - Path=/notes/**

        - id: risk-assessment-service
          uri: http://localhost:8084
          predicates:
            - Path=/assess/**

jwt:
  secret: diabetes-secret-key-32-bytes-long!